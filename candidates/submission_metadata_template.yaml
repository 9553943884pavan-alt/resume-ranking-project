ai_usage_summary: |
  Used ChatGPT as a development assistant for brainstorming ranking strategies, reviewing scoring logic, debugging Python code,
  validating candidate-ranking methodology, and refining feature engineering decisions. All final implementation, scoring design,
  candidate analysis, and submission outputs were manually reviewed, validated, and executed by me.
  Code was written by ChatGPT

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Built a multi-stage candidate ranking pipeline for a Search/Ranking ML role.
  First, candidate profiles were transformed into structured documents by combining title, headline, summary, 
  career history, search evidence, skills, and education. Both candidate documents and the JD were preprocessed and embedded using a sentence-transformer model.
  Semantic retrieval was used to identify the most relevant candidates. A custom search-evidence scorer then rewarded explicit experience in retrieval systems, 
  learning-to-rank, semantic search, embeddings, vector databases, recommendation systems, NDCG/MRR evaluation, and production search infrastructure.
  Additional scoring layers evaluated technical assessments, recruiter-behavior signals, logistics fit (location, notice period, salary expectations, 
  relocation flexibility), and years of experience alignment with the target range. Scores were normalized and combined using weighted ranking to balance relevance, technical strength, 
  hiring feasibility, and candidate availability. The final ranking was validated through manual recruiter-style analysis of top and bottom candidates to ensure 
  genuine search-engineering profiles ranked above generic AI/ML candidates and to reduce keyword-matching bias.

